baseURL = "https://anpii.github.io/pij-blog/"
locale = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Pij's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Pi 的个人博客 - 记录技术笔记、机器人、VLA 模型与深度学习相关内容"
  keywords = ["机器人","VLA","深度学习","具身智能","MoE","技术博客"]
  author = "Pi"

  # Label / logo
  label = true
  [params.label]
    text = "Pij's Blog"
    icon = "/apple-touch-icon.png"
    iconHeight = 32

  # Default theme
  defaultTheme = "auto"
  disableThemeToggle = false
  disableSpecial1stPost = false

  # Home page mode: profile mode
  homeInfoParams = true

  # Reading
  ShowReadingTime = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowShareButtons = true
  ShowToc = true
  UseHugoToc = false

  # Social
  comments = false
  social = true

  # Cover images
  [params.cover]
    hiddenInSingle = false
    hiddenInList = false
    linkFullImages = true
    responsiveImages = true

  # Home info
  [params.homeInfoParams]
    Title = "嗨，我是 Pi 👋"
    Content = "这里记录我的想法、笔记和一些技术文档。"

  # Profile mode (more visually appealing)
  [params.profileMode]
    enabled = true
    title = "Pij's Blog"
    subtitle = "机器人 · 深度学习 · 技术笔记"
    imageUrl = "/apple-touch-icon.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "P"

    [[params.profileMode.buttons]]
      name = "📝 最新博客"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "📖 文档"
      url = "/docs/"
    [[params.profileMode.buttons]]
      name = "🏷️ 标签"
      url = "/tags/"

  # Social icons
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Anpii"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:hello@example.com"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # OG image for social sharing
  images = ["/og-image.png"]

  # Favicon
  [params.favicon]
    icon = "/favicon.ico"
    appleTouch = "/apple-touch-icon.png"

[menu]

  [[menu.main]]
    identifier = "posts"
    name = "博客"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "docs"
    name = "文档"
    url = "/docs/"
    weight = 20

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
