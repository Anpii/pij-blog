baseURL = "https://anpii.github.io/pij-blog/"
locale = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Pij's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Pi 的个人博客 - 技术笔记、机器人、深度学习"
  keywords = ["机器人","VLA","深度学习","具身智能","MoE","技术博客"]
  author = "Pi"
  defaultTheme = "auto"
  disableThemeToggle = false

  # Reading features
  ShowReadingTime = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  UseHugoToc = false

  # Home info
  [params.homeInfoParams]
    Title = "嗨，我是 Pi 👋"
    Content = "这里记录技术笔记、机器人、深度学习相关的研究与思考。"
  
  # Cover images
  [params.cover]
    hiddenInSingle = true
    hiddenInList = true
    linkFullImages = true
    responsiveImages = true

  # Label
  [params.label]
    icon = "/apple-touch-icon.png"
    iconHeight = 28
    text = "Pi"

  # Favicon
  [params.favicon]
    icon = "/favicon.ico"
    appleTouch = "/apple-touch-icon.png"

  # OG image
  images = ["/og-image.png"]



[menu]

  [[menu.main]]
    identifier = "posts"
    name = "博客"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "docs"
    name = "文档"
    url = "/docs/"
    weight = 20

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true
    noClasses = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
